global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 192.168.0.199:9093

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.0.199:9100']
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.0.199:9090']

  - job_name: 'cAlerts'
    static_configs:
      - targets: ['192.168.0.199:8080']

  - job_name: blackbox-http

    metrics_path: /probe

    params:
      module:
        - http_2xx

    static_configs:
      - targets:
          - https://github.com
          - https://grafana.com
          - https://prometheus.io

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: 192.168.0.199:9115
