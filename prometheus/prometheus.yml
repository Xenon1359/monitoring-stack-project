global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.0.199:9100']
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.0.199:9090']

  - job_name: 'cAlerts'
    static_configs:
      - targets: ['192.168.0.199:8080']
