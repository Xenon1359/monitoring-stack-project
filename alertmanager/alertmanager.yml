global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: [your_bot_token]
        chat_id: [your_chat_id] 
        send_resolved: true

templates: []
